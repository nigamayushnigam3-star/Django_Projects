<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <title>Image Uploader </title>
</head>
<body>
<div class="container">
<div class="py-5 text-center bg-secondary text-white">
<h1 class="mb-3">Upload Image</h1>
<form action="" method="post" enctype="multipart/form-data">
{% csrf_token %}
{{form}}
<input type="submit" class="btn btn-danger"
value="Upload">
{% comment %} jb bhi upload btn press hoga toh post method jayega  {% endcomment %}
</form>
</div>
</div>

 {% comment %} using for loop for showing every data  {% endcomment %}
<div class="row">
{% for x in img %}
<div class="col-sm-4">
<div class="card m-2">
<img src="{{x.photo.url}}" alt="" class="card-img-top"
height="200px">
</div>
</div>
{% endfor %} 
</div>
</body>
</html>
